name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: |
          pio run -e esp32dev
          pio run -e esp32s3dev
        env:
          LUMIGATE_VERSION: "1.0.${{ github.run_number }}"

      - name: Collect binaries
        run: |
          echo "Build outputs:"
          find .pio/build -name "firmware.bin" 2>/dev/null
          BOOT_APP0=$(find ~/.platformio/packages -name "boot_app0.bin" 2>/dev/null | head -1)
          cp .pio/build/esp32dev/firmware.bin         firmware.bin
          cp .pio/build/esp32dev/bootloader.bin        bootloader.bin
          cp .pio/build/esp32dev/partitions.bin        partitions.bin
          cp "$BOOT_APP0"                              boot_app0.bin
          cp .pio/build/esp32s3dev/firmware.bin        firmware-esp32s3.bin
          cp .pio/build/esp32s3dev/bootloader.bin      bootloader-esp32s3.bin
          cp .pio/build/esp32s3dev/partitions.bin      partitions-esp32s3.bin
          echo "1.0.${{ github.run_number }}" > version.txt

      - name: Delete existing latest release
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish rolling latest release
        run: |
          gh release create latest \
            --title "v1.0.${{ github.run_number }} ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --notes "Version 1.0.${{ github.run_number }} — built from ${{ github.sha }}.

          Flash files:
          - **ESP32** (WROOM-32, WROVER): \`firmware.bin\` + \`flash.ps1\`
          - **ESP32-S3** (DevKitC-1): \`firmware-esp32s3.bin\`" \
            --prerelease \
            firmware.bin bootloader.bin partitions.bin boot_app0.bin \
            firmware-esp32s3.bin bootloader-esp32s3.bin partitions-esp32s3.bin \
            version.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
